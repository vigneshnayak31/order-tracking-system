<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register — Order Tracking System</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="auth-page">
  <div class="auth-box" style="max-width:460px">
    <div class="auth-brand">📦 Order<span>Tracking</span></div>
    <p class="auth-subtitle">Create your account — saved to MongoDB.</p>

    <form id="regForm" onsubmit="handleRegister(event)">
      <div class="grid-2">
        <div class="form-group">
          <label class="form-label">Full Name</label>
          <input type="text" class="form-input" id="name" placeholder="Your name" required>
          <span class="form-error" id="nameErr">Name required.</span>
        </div>
        <div class="form-group">
          <label class="form-label">Phone Number</label>
          <input type="tel" class="form-input" id="phone" placeholder="10-digit number" required maxlength="10" pattern="[0-9]{10}">
          <span class="form-error" id="phoneErr">Enter valid 10-digit number.</span>
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">Email Address</label>
        <div class="input-icon-wrap">
          <span class="i-icon">✉</span>
          <input type="email" class="form-input" id="email" placeholder="you@example.com" required>
        </div>
        <span class="form-error" id="emailErr">Please enter a valid email.</span>
      </div>

      <div class="form-group">
        <label class="form-label">Password</label>
        <div class="input-icon-wrap">
          <span class="i-icon">🔒</span>
          <input type="password" class="form-input" id="password" placeholder="Min 6 characters" required minlength="6">
        </div>
        <span class="form-error" id="passErr">Password must be at least 6 characters.</span>
      </div>

      <div class="form-group">
        <label class="form-label">Delivery Address <span style="font-weight:400;color:var(--gray-400)">(optional)</span></label>
        <input type="text" class="form-input" id="address" placeholder="e.g. 12, MG Road, Bengaluru">
      </div>

      <button type="submit" class="btn btn-primary btn-block btn-lg" id="regBtn">
        Create Account
      </button>
    </form>

    <div class="info-box blue" style="margin-top:1rem">
      🔒 Your details are securely stored in MongoDB. No dummy credentials needed.
    </div>

    <p class="auth-switch">
      Already have an account? <a href="login.html">Sign in →</a>
    </p>
  </div>
</div>

<div class="toast-container"></div>
<script src="js/app.js"></script>
<script>
  redirectIfLoggedIn();

  async function handleRegister(e) {
    e.preventDefault();
    const name     = document.getElementById('name').value.trim();
    const email    = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const phone    = document.getElementById('phone').value.trim();
    const address  = document.getElementById('address').value.trim();
    const btn      = document.getElementById('regBtn');

    if (phone.length !== 10) {
      document.getElementById('phoneErr').classList.add('show');
      return;
    }

    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span> Creating account...';

    try {
      const data = await apiPost('/auth/register', { name, email, password, phone, address });
      App.login(data.user, data.token);
      showToast('Account created! Welcome, ' + data.user.name, 'success');
      setTimeout(() => window.location.href = 'restaurants.html', 600);
    } catch (err) {
      showToast(err.message, 'error');
      btn.disabled = false;
      btn.innerHTML = 'Create Account';
    }
  }
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — Order Tracking System</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="auth-page">
  <div class="auth-box">
    <div class="auth-brand">📦 Order<span>Tracking</span></div>
    <p class="auth-subtitle">Sign in to track your orders in real-time.</p>

    <form id="loginForm" onsubmit="handleLogin(event)">
      <div class="form-group">
        <label class="form-label">Email Address</label>
        <div class="input-icon-wrap">
          <span class="i-icon">✉</span>
          <input type="email" class="form-input" id="email" placeholder="you@example.com" required>
        </div>
        <span class="form-error" id="emailErr">Please enter a valid email.</span>
      </div>

      <div class="form-group">
        <label class="form-label">Password</label>
        <div class="input-icon-wrap">
          <span class="i-icon">🔒</span>
          <input type="password" class="form-input" id="password" placeholder="Your password" required>
        </div>
        <span class="form-error" id="passErr">Password required.</span>
      </div>

      <button type="submit" class="btn btn-primary btn-block btn-lg" id="loginBtn">
        Sign In
      </button>
    </form>

    <div class="info-box blue mt-2" style="margin-top:1rem">
      ℹ️ Register first to create your account. All data is stored in MongoDB.
    </div>

    <p class="auth-switch">
      Don't have an account? <a href="register.html">Create one →</a>
    </p>
  </div>
</div>

<div class="toast-container"></div>
<script src="js/app.js"></script>
<script>
  redirectIfLoggedIn();

  async function handleLogin(e) {
    e.preventDefault();
    const email    = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const btn      = document.getElementById('loginBtn');

    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span> Signing in...';

    try {
      const data = await apiPost('/auth/login', { email, password });
      App.login(data.user, data.token);
      showToast('Welcome back, ' + data.user.name + '!', 'success');
      setTimeout(() => window.location.href = 'restaurants.html', 600);
    } catch (err) {
      showToast(err.message, 'error');
      btn.disabled = false;
      btn.innerHTML = 'Sign In';
    }
  }
</script>
</body>
</html>

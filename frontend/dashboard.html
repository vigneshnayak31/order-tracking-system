<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard — Order Tracking System</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    .dash-layout { display: grid; grid-template-columns: 1fr 1fr; gap: 1.25rem; }
    @media(max-width:900px){ .dash-layout { grid-template-columns: 1fr; } }
    .full-col { grid-column: 1 / -1; }
    .obj-badge {
      display:inline-flex; align-items:center; gap:.4rem;
      padding:.2rem .65rem; border-radius:99px;
      font-size:.72rem; font-weight:700; letter-spacing:.03em; text-transform:uppercase;
      background:var(--blue-100); color:var(--blue-800); border:1px solid var(--blue-200);
    }
    .obj-badge.obj2 { background:#FFF3E0; color:#E65100; border-color:#FFCC80; }
    .obj-badge.obj3 { background:#F3E5F5; color:#6A1B9A; border-color:#CE93D8; }
  </style>
</head>
<body>
<div id="navMount"></div>

<div class="page-wrap">
  <div class="section-title">
    <div class="flex items-center gap-1 mb-1">
      <h2>Analytics Dashboard</h2>
      <span id="refreshBtn" class="btn btn-outline btn-sm" onclick="loadDash()" style="cursor:pointer">↻ Refresh</span>
    </div>
    <p>MongoDB aggregations (Obj 1) + Redis real-time data (Obj 2) + API integration (Obj 3)</p>
  </div>

  <div class="page-loader" id="loader"><div class="spinner"></div> Running MongoDB aggregations &amp; fetching Redis data…</div>
  <div id="dashContent" style="display:none"></div>
</div>

<div class="toast-container"></div>
<script src="js/app.js"></script>
<script>
  document.getElementById('navMount').innerHTML = renderNavbar('dashboard');

  async function loadDash() {
    document.getElementById('loader').style.display = 'flex';
    document.getElementById('dashContent').style.display = 'none';
    try {
      const data = await apiGet('/dashboard/analytics');
      document.getElementById('loader').style.display = 'none';
      document.getElementById('dashContent').style.display = 'block';
      renderDash(data);
    } catch (err) {
      document.getElementById('loader').innerHTML = `<span style="color:var(--red)">❌ Error: ${err.message} — Make sure server is running.</span>`;
    }
  }

  function renderDash(data) {
    const m = data.mongodb;
    const r = data.redis;

    const statusColors = { placed:'#1D4ED8', accepted:'#166534', preparing:'#9A3412', out_for_delivery:'#0369A1', delivered:'#166534', cancelled:'#9F1239' };

    document.getElementById('dashContent').innerHTML = `
      <!-- ── Top stats ── -->
      <div class="dash-grid">
        <div class="stat-card accent-blue">
          <div class="stat-label">Total Orders</div>
          <div class="stat-val">${m.total_orders.toLocaleString()}</div>
          <div class="stat-sub">Stored in MongoDB</div>
        </div>
        <div class="stat-card accent-green">
          <div class="stat-label">Total Revenue</div>
          <div class="stat-val">₹${(m.total_revenue/1000).toFixed(1)}<small>K</small></div>
          <div class="stat-sub">From delivered orders</div>
        </div>
        <div class="stat-card accent-orange">
          <div class="stat-label">Active Orders</div>
          <div class="stat-val">${r.active_order_count}</div>
          <div class="stat-sub">${r.available ? '⚡ Live from Redis' : '⚠️ Redis offline'}</div>
        </div>
        <div class="stat-card accent-red">
          <div class="stat-label">Queue Length</div>
          <div class="stat-val">${r.queue_length}</div>
          <div class="stat-sub">Orders in delivery:queue</div>
        </div>
      </div>

      <div class="dash-layout">

        <!-- ── Objective 1: Revenue per restaurant ── -->
        <div class="card">
          <div class="card-header">
            <span class="obj-badge">Obj 1</span> Revenue per Restaurant
            <span class="text-xs text-muted" style="margin-left:auto">MongoDB Aggregation</span>
          </div>
          <div class="table-wrap">
            <table>
              <thead><tr><th>Restaurant</th><th>Revenue</th><th>Orders</th></tr></thead>
              <tbody>
                ${m.revenue_per_restaurant.length
                  ? m.revenue_per_restaurant.map(r => `
                    <tr>
                      <td style="font-weight:600">${r.restaurant_name}</td>
                      <td style="color:var(--blue-700);font-weight:700">₹${r.total_revenue.toLocaleString()}</td>
                      <td>${r.order_count}</td>
                    </tr>`).join('')
                  : `<tr><td colspan="3" style="text-align:center;color:var(--gray-400);padding:1.5rem">No delivered orders yet</td></tr>`
                }
              </tbody>
            </table>
          </div>
        </div>

        <!-- ── Objective 1: Most ordered items ── -->
        <div class="card">
          <div class="card-header">
            <span class="obj-badge">Obj 1</span> Most Ordered Items
            <span class="text-xs text-muted" style="margin-left:auto">$unwind + $group</span>
          </div>
          <div style="padding:.75rem 1rem">
            ${m.most_ordered_items.map((item, i) => `
              <div style="display:flex;align-items:center;gap:.75rem;padding:.5rem 0;border-bottom:1px solid var(--gray-100)">
                <div style="width:24px;height:24px;border-radius:50%;background:var(--blue-${i===0?'700':i===1?'500':'300'});color:#fff;display:flex;align-items:center;justify-content:center;font-size:.75rem;font-weight:800;flex-shrink:0">${i+1}</div>
                <div style="flex:1;font-weight:600;font-size:.9rem">${item._id}</div>
                <div style="font-weight:800;color:var(--blue-700)">${item.total_ordered} sold</div>
              </div>`).join('')}
          </div>
        </div>

        <!-- ── Objective 1: Avg delivery time ── -->
        <div class="card">
          <div class="card-header">
            <span class="obj-badge">Obj 1</span> Avg Delivery Time
            <span class="text-xs text-muted" style="margin-left:auto">$avg aggregation</span>
          </div>
          <div class="table-wrap">
            <table>
              <thead><tr><th>Restaurant</th><th>Avg Time</th><th>Orders</th></tr></thead>
              <tbody>
                ${m.avg_delivery_time.length
                  ? m.avg_delivery_time.map(r => `
                    <tr>
                      <td style="font-weight:600">${r.restaurant_name}</td>
                      <td><span style="color:var(--orange);font-weight:700">⏱ ${r.avg_delivery_time} min</span></td>
                      <td>${r.count}</td>
                    </tr>`).join('')
                  : `<tr><td colspan="3" style="text-align:center;color:var(--gray-400);padding:1.5rem">No delivered orders yet — place and deliver orders to see stats</td></tr>`
                }
              </tbody>
            </table>
          </div>
        </div>

        <!-- ── Status distribution ── -->
        <div class="card">
          <div class="card-header">
            <span class="obj-badge">Obj 1</span> Order Status Distribution
          </div>
          <div style="padding:.75rem 1rem">
            ${m.status_distribution.map(s => {
              const pct = m.total_orders > 0 ? Math.round(s.count / m.total_orders * 100) : 0;
              return `
                <div style="margin-bottom:.75rem">
                  <div style="display:flex;justify-content:space-between;margin-bottom:.3rem">
                    <span style="font-size:.85rem;font-weight:600;text-transform:capitalize">${s._id.replace(/_/g,' ')}</span>
                    <span style="font-size:.85rem;font-weight:700">${s.count} (${pct}%)</span>
                  </div>
                  <div style="height:8px;background:var(--gray-100);border-radius:99px;overflow:hidden">
                    <div style="height:100%;width:${pct}%;background:${statusColors[s._id]||'var(--blue-500)'};border-radius:99px;transition:width .6s"></div>
                  </div>
                </div>`;
            }).join('')}
          </div>
        </div>

        <!-- ── Redis: Active orders ── -->
        <div class="card">
          <div class="card-header">
            <span class="obj-badge obj2">Obj 2</span> Active Orders in Redis
            <span class="text-xs text-muted" style="margin-left:auto">HGETALL order:*</span>
          </div>
          ${r.available ? `
            ${r.active_orders.length ? `
              <div class="table-wrap">
                <table>
                  <thead><tr><th>Order ID</th><th>Status</th><th>Restaurant</th><th>ETA</th></tr></thead>
                  <tbody>
                    ${r.active_orders.map(o => `
                      <tr>
                        <td style="font-family:monospace;font-size:.75rem">${o.order_id?.slice(-8)}…</td>
                        <td>${statusPill(o.status)}</td>
                        <td style="font-size:.82rem">${o.restaurant_name||'—'}</td>
                        <td style="color:var(--orange);font-weight:600">${o.eta||'—'}m</td>
                      </tr>`).join('')}
                  </tbody>
                </table>
              </div>
            ` : `<div style="padding:2rem;text-align:center;color:var(--gray-400)">No active orders in Redis right now</div>`}
          ` : `<div class="info-box orange" style="margin:1rem"><span>⚠️ Redis is offline. Start Redis server: <code>redis-server</code></span></div>`}
        </div>

        <!-- ── Redis: Delivery queue ── -->
        <div class="card">
          <div class="card-header">
            <span class="obj-badge obj2">Obj 2</span> Delivery Queue
            <span class="text-xs text-muted" style="margin-left:auto">LRANGE delivery:queue</span>
          </div>
          <div style="padding:.75rem 1rem">
            ${r.available ? (
              r.delivery_queue.length
                ? r.delivery_queue.map((id,i) => `
                    <div class="queue-item">
                      <div class="queue-pos">${i+1}</div>
                      <span style="font-family:monospace;font-size:.8rem;flex:1">${id}</span>
                      <a href="tracking.html?id=${id}" class="btn btn-outline btn-sm">Track</a>
                    </div>`).join('')
                : `<div style="padding:1.5rem;text-align:center;color:var(--gray-400)">Queue is empty — no pending deliveries</div>`
            ) : `<div class="info-box orange">⚠️ Redis offline</div>`}

            <div class="divider"></div>
            <div style="display:flex;align-items:center;gap:.75rem;flex-wrap:wrap">
              <button class="btn btn-outline btn-sm" onclick="popQueue()">LPOP Queue (Assign Agent)</button>
              <span class="text-xs text-muted">Simulates delivery agent picking next order</span>
            </div>
          </div>
        </div>

        <!-- ── Redis log / debug ── -->
        <div class="card full-col">
          <div class="card-header">
            <span class="obj-badge obj3">Obj 3</span> Redis Command Log &amp; API Endpoints
          </div>
          <div style="padding:.75rem 1rem;display:grid;grid-template-columns:1fr 1fr;gap:1.25rem">
            <div>
              <div class="text-xs text-muted fw-700 mb-1" style="text-transform:uppercase;letter-spacing:.05em">Redis Operations Used</div>
              <div class="redis-log">
<span class="cmd">── Objective 2a: Order Status (Hash) ──</span>
<span class="ok">HSET order:&lt;id&gt; status placed restaurant_id ... eta 35</span>
<span class="ok">HSET order:&lt;id&gt; status accepted</span>
<span class="ok">HSET order:&lt;id&gt; status preparing</span>
<span class="ok">HSET order:&lt;id&gt; status out_for_delivery</span>
<span class="ok">HSET order:&lt;id&gt; status delivered</span>
<span class="info">DEL  order:&lt;id&gt;  // migrated to MongoDB</span>

<span class="cmd">── Objective 2b: Delivery Queue (List) ──</span>
<span class="ok">RPUSH delivery:queue &lt;orderId&gt;</span>
<span class="ok">LPOP  delivery:queue  // agent picks order</span>
<span class="ok">LRANGE delivery:queue 0 -1</span>

<span class="cmd">── Objective 2c: Restaurant Heartbeat ──</span>
<span class="ok">SETEX restaurant:online:&lt;id&gt; 300 1</span>
<span class="info">// Key auto-expires after 300s</span>

<span class="cmd">── Objective 2d: Rate Limiting ──</span>
<span class="ok">INCR  rate:order:&lt;userId&gt;</span>
<span class="ok">EXPIRE rate:order:&lt;userId&gt; 3600</span>
<span class="info">// Max 5 orders/hour per user</span>
              </div>
            </div>
            <div>
              <div class="text-xs text-muted fw-700 mb-1" style="text-transform:uppercase;letter-spacing:.05em">API Endpoints (Obj 3a)</div>
              <div class="redis-log">
<span class="cmd">POST   /auth/register</span>
<span class="info">// Create user → MongoDB</span>
<span class="cmd">POST   /auth/login</span>
<span class="info">// JWT token returned</span>

<span class="cmd">GET    /restaurants</span>
<span class="info">// All restaurants + Redis status</span>
<span class="cmd">GET    /restaurant/:id/menu</span>
<span class="info">// Menu + heartbeat SETEX</span>

<span class="cmd">POST   /order/place</span>
<span class="info">// Rate check → MongoDB → HSET → RPUSH</span>
<span class="cmd">GET    /order/:id/status</span>
<span class="info">// Redis first → MongoDB fallback</span>
<span class="cmd">PATCH  /order/:id/status</span>
<span class="info">// Update Redis HSET + MongoDB</span>
<span class="info">// On delivered: DEL Redis → MongoDB</span>

<span class="cmd">GET    /dashboard/analytics</span>
<span class="info">// MongoDB $aggregate + Redis live</span>
<span class="cmd">POST   /delivery/pop</span>
<span class="info">// LPOP queue → assign agent</span>
              </div>
            </div>
          </div>
        </div>

        <!-- ── Daily Orders Chart ── -->
        ${m.daily_orders_last_7_days.length ? `
          <div class="card full-col">
            <div class="card-header">
              <span class="obj-badge">Obj 1</span> Orders Last 7 Days
            </div>
            <div style="padding:1rem">
              ${(() => {
                const max = Math.max(...m.daily_orders_last_7_days.map(d=>d.orders), 1);
                return `<div style="display:flex;align-items:flex-end;gap:.5rem;height:120px;padding-bottom:.5rem">
                  ${m.daily_orders_last_7_days.map(d => `
                    <div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:.35rem">
                      <div style="font-size:.7rem;font-weight:700;color:var(--blue-700)">${d.orders}</div>
                      <div style="width:100%;background:var(--blue-500);border-radius:4px 4px 0 0;height:${Math.round(d.orders/max*100)}px;min-height:4px;transition:height .4s"></div>
                      <div style="font-size:.65rem;color:var(--gray-400);white-space:nowrap">${d._id.slice(5)}</div>
                    </div>`).join('')}
                </div>`;
              })()}
            </div>
          </div>
        ` : ''}

      </div>
    `;
  }

  async function popQueue() {
    try {
      const data = await apiPost('/delivery/pop', {});
      showToast(data.message || 'Popped from queue', 'success');
      setTimeout(loadDash, 800);
    } catch (err) {
      showToast(err.message, 'error');
    }
  }

  loadDash();
  setInterval(checkRedisStatus, 8000);
</script>
</body>
</html>
